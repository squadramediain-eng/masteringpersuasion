  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ans';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url(\"cbcda512-55ca-40f8-9559-69b48a0ce557\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url(\"a3bc9dce-45b8-4512-a5ac-5f4de94dba56\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root { --ink:#17325f; --accent:#3761b6; --line:#d3e0f2; }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  body {\n    background: #dce5f1;\n    font-family: 'DM Sans', system-ui, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n  }\n  header {\n    padding: 40px 48px 28px;\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    gap: 24px;\n    flex-wrap: wrap;\n    border-bottom: 1px solid var(--line);\n  }\n  header .title { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }\n  header .sub { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 0.04em; }\n  header .meta { font-family: 'DM Mono', monospace; font-size: 13px; color: #6c7da4; }\n  main {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));\n    gap: 40px;\n    padding: 40px 48px 80px;\n  }\n  @media (max-width: 700px) { main { grid-template-columns: 1fr; padding: 28px; gap: 28px; } }\n  figure { margin: 0; }\n  .card {\n    background: #fff;\n    border: 1px solid var(--line);\n    border-radius: 16px;\n    overflow: hidden;\n    box-shadow: 0 10px 30px rgba(37,55,97,0.12);\n  }\n  .frame-head {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    padding: 14px 20px;\n    border-bottom: 1px solid #eef2f9;\n  }\n  .num {\n    font-family: 'DM Mono', monospace;\n    font-size: 13px;\n    font-weight: 500;\n    color: #fff;\n    background: var(--accent);\n    padding: 3px 9px;\n    border-radius: 999px;\n    letter-spacing: 0.04em;\n  }\n  .label { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }\n  .tc { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: #3761b6; background:#eaf1fb; padding:2px 9px; border-radius:999px; }\n  .filename { margin-left: 12px; font-family: 'DM Mono', monospace; font-size: 12px; color: #8a99bd; }\n  /* 16:9 responsive SVG holder */\n  .stage { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #f2f4f9; }\n  .stage object, .stage img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; border: 0; }\n  footer { padding: 0 48px 60px; font-family: 'DM Mono', monospace; font-size: 12px; color: #6c7da4; }\n\n  /* ---- QA review toolbar ---- */\n  .qabar {\n    position: sticky; top: 0; z-index: 20;\n    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;\n    padding: 12px 48px;\n    background: #17325f; color: #eaf1fb;\n    box-shadow: 0 4px 18px rgba(37,55,97,0.28);\n  }\n  .qabar .brandmark { font-weight: 800; letter-spacing: -0.01em; font-size: 15px; }\n  .qabar label { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.04em; color: #9ac7fd; }\n  .qabar input[type=text] {\n    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;\n    padding: 7px 12px; border-radius: 999px; border: 0; min-width: 180px;\n    background: #eaf1fb; color: #17325f;\n  }\n  .qabar input[type=text]:focus { outline: 2px solid #6084f0; }\n  .qabar .spacer { flex: 1 1 auto; }\n  .qabar .pill {\n    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;\n    background: rgba(154,199,253,0.16); color: #cfe0f8;\n    padding: 5px 12px; border-radius: 999px;\n  }\n  .qabar button, .qabar .filelabel {\n    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;\n    padding: 8px 15px; border-radius: 999px; border: 0; cursor: pointer;\n    background: #3761b6; color: #fff; transition: transform .16s cubic-bezier(.16,1,.3,1), background .16s;\n  }\n  .qabar button:hover, .qabar .filelabel:hover { transform: translateY(-2px); background: #4b74c9; }\n  .qabar button:active, .qabar .filelabel:active { transform: translateY(1px) scale(.98); }\n  .qabar button.ghost { background: rgba(234,241,251,0.12); }\n  .qabar button.ghost:hover { background: rgba(234,241,251,0.22); }\n  .qabar .filelabel input { display: none; }\n\n  /* ---- per-frame comment thread ---- */\n  .comments { border-top: 1px solid #eef2f9; padding: 12px 20px 16px; }\n  .comments .chead {\n    display: flex; align-items: center; gap: 10px; cursor: pointer;\n    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.04em; color: #3761b6;\n    user-select: none;\n  }\n  .comments .cbadge {\n    font-weight: 600; color: #fff; background: #6084f0;\n    padding: 2px 9px; border-radius: 999px; font-size: 12px; min-width: 20px; text-align: center;\n  }\n  .comments .cbadge.zero { background: #b9c6de; }\n  .comments .ctoggle { margin-left: auto; color: #8a99bd; }\n  .comments .cbody { margin-top: 12px; display: none; }\n  .comments.open .cbody { display: block; }\n  .thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }\n  .cmt {\n    background: #f4f7fc; border: 1px solid #e3ebf7; border-radius: 12px;\n    padding: 10px 13px; font-size: 14px; line-height: 1.5;\n  }\n  .cmt.resolved { opacity: .6; }\n  .cmt .cmeta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }\n  .cmt .cauthor { font-weight: 700; font-size: 13px; color: #17325f; }\n  .cmt .ctime { font-family: 'DM Mono', monospace; font-size: 11px; color: #8a99bd; }\n  .cmt .ctext { color: #2b3d63; white-space: pre-wrap; word-break: break-word; }\n  .cmt .cactions { display: flex; gap: 12px; margin-top: 6px; }\n  .cmt .cactions button {\n    background: none; border: 0; padding: 0; cursor: pointer;\n    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.03em; color: #6c7da4;\n  }\n  .cmt .cactions button:hover { color: #3761b6; text-decoration: underline; }\n  .cmt.resolved .ctext { text-decoration: line-through; text-decoration-color: #b9c6de; }\n  .cform { display: flex; flex-direction: column; gap: 8px; }\n  .cform textarea {\n    font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5;\n    padding: 10px 12px; border-radius: 12px; border: 1px solid #d3e0f2; resize: vertical; min-height: 58px;\n    color: #17325f;\n  }\n  .cform textarea:focus { outline: 2px solid #6084f0; border-color: transparent; }\n  .cform .crow { display: flex; align-items: center; gap: 10px; }\n  .cform .hint { font-family: 'DM Mono', monospace; font-size: 11px; color: #8a99bd; }\n  .cform button {\n    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; margin-left: auto;\n    padding: 8px 16px; border-radius: 999px; border: 0; cursor: pointer;\n    background: #3761b6; color: #fff; transition: transform .16s cubic-bezier(.16,1,.3,1);\n  }\n  .cform button:hover { transform: translateY(-2px); }\n  .cform button:active { transform: translateY(1px) scale(.98); }\n  .card.flag { box-shadow: 0 0 0 2px #6084f0, 0 10px 30px rgba(37,55,97,0.18); }\n  @media print { .qabar { position: static; } .cform { display: none; } .comments .cbody { display: block; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"qabar\">\n    <span class=\"brandmark\">QA Review<\u002Fspan>\n    <label for=\"reviewer\">REVIEWER<\u002Flabel>\n    <input type=\"text\" id=\"reviewer\" placeholder=\"Your name…\" autocomplete=\"off\">\n    <span class=\"spacer\"><\u002Fspan>\n    <span class=\"pill\" id=\"statTotal\">0 comments<\u002Fspan>\n    <span class=\"pill\" id=\"statOpen\">0 open<\u002Fspan>\n    <button id=\"btnExpand\" class=\"ghost\" type=\"button\">Expand all<\u002Fbutton>\n    <button id=\"btnExport\" type=\"button\">Export comments<\u002Fbutton>\n    <label class=\"filelabel\">Import<input type=\"file\" id=\"fileImport\" accept=\"application/json\"><\u002Flabel>\n    <button id=\"btnClearMine\" class=\"ghost\" type=\"button\">Clear mine<\u002Fbutton>\n  <\u002Fdiv>\n  <header>\n    <div>\n      <div class=\"title\">Mastering Persuasion<\u002Fdiv>\n      <div class=\"sub\">STS MOTION · PERSUASION — EXPLAINER FRAMES<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"meta\">20 / 20 frames · 1920×1080 · 9:46 runtime · audio-locked<\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n    <figure class=\"card\">\n      <div class=\"frame-head\">\n        <span class=\"num\">00<\u002Fspan>\n        <span class=\"label\">Cover — Mastering Persuasion<\u002Fspan>\n        <span class=\"tc\">0:00–0:33<\u002Fspan><span class=\"filename\">frame_0.svg<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stage\"><img src=\"ddaccda9-603c-47c4-a681-306fdc86d50f\" alt=\"Frame 01 cover\"><\u002Fdiv>\n    <\u002Ffigure>\n\n    <figure class=\"card\">\n      <div class=\"frame-head\">\n        <span class=\"num\">01<\u002Fspan>\n        <span class=\"label\">What is Persuasion — Definition<\u002Fspan>\n        <span class=\"tc\">0:34–0:58<\u002Fspan><span class=\"filename\">frame_1.svg<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stage\"><img src=\"84a294ef-9e01-4c44-9db6-e10209eefbe3\" alt=\"Frame 02 definition\"><\u002Fdiv>\n    <\u002Ffigure>\n\n    <figure class=\"card\">\n      <div class=\"frame-head\">\n        <span class=\"num\">02<\u002Fspan>\n        <span class=\"label\">Six Key Areas — Overview<\u002Fspan>\n        <span class=\"tc\">0:59–1:28<\u002Fspan><span class=\"filename\">frame_2.svg<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stage\"><img src=\"8290cf7b-d48e-42a2-aa00-9 <div class=\"frame-head\"><span class=\"num\">08<\u002Fspan><span class=\"label\">Correcting Habits — Securing Buy-In<\u002Fspan><span class=\"tc\">3:51–4:11<\u002Fspan><span class=\"filename\">frame_8.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"c63d880a-50c1-4f90-a9f2-7de31f413389\" alt=\"Frame 08\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">09<\u002Fspan><span class=\"label\">Strategy Table<\u002Fspan><span class=\"tc\">4:12–4:45<\u002Fspan><span class=\"filename\">frame_9.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"d57a57f6-2b11-4bdd-b8dd-487f6b6afd09\" alt=\"Frame 09\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">10<\u002Fspan><span class=\"label\">The 30-Second Metric<\u002Fspan><span class=\"tc\">4:46–5:14<\u002Fspan><span class=\"filename\">frame_10.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"6fc79741-ef31-4564-bbda-af2bc562b512\" alt=\"Frame 10\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">11<\u002Fspan><span class=\"label\">Resolving Disputes — Terminal Conflicts<\u002Fspan><span class=\"tc\">5:15–5:34<\u002Fspan><span class=\"filename\">frame_11.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"3e573b7a-9784-476c-b30d-eee148a9a0cf\" alt=\"Frame 11\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">12<\u002Fspan><span class=\"label\">Terminal Conflict — Compromise<\u002Fspan><span class=\"tc\">5:35–6:03<\u002Fspan><span class=\"filename\">frame_12.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"63ee06dd-3343-43da-a66b-005a63c878ba\" alt=\"Frame 12\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">13<\u002Fspan><span class=\"label\">Escalate vs Compromise<\u002Fspan><span class=\"tc\">6:04–6:48<\u002Fspan><span class=\"filename\">frame_13.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"24e833ce-30c6-44dc-a59b-882edb2661a2\" alt=\"Frame 13\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">14<\u002Fspan><span class=\"label\">New Procedures — Engine Room<\u002Fspan><span class=\"tc\">6:49–7:14<\u002Fspan><span class=\"filename\">frame_14.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"aeda0219-8273-4c72-9ea1-3b6554b7c2e1\" alt=\"Frame 14\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">15<\u002Fspan><span class=\"label\">What's In It For Me<\u002Fspan><span class=\"tc\">7:15–7:48<\u002Fspan><span class=\"filename\">frame_15.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"3425a509-a00f-4373-a8ee-211881533038\" alt=\"Frame 15\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">16<\u002Fspan><span class=\"label\">Key Behaviours — Influence Styles<\u002Fspan><span class=\"tc\">7:49–8:02<\u002Fspan><span class=\"filename\">frame_16.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"a40c5471-6b65-4cbd-bf05-5e020ec72e74\" alt=\"Frame 16\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">17<\u002Fspan><span class=\"label\">Behaviour &amp; Influence Table<\u002Fspan><span class=\"tc\">8:03–8:31<\u002Fspan><span class=\"filename\">frame_17.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"4e36d050-f7e3-4d07-9438-f3f1d4aa6927\" alt=\"Frame 17\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">18<\u002Fspan><span class=\"label\">Persuasive Leader Traits<\u002Fspan><span class=\"tc\">8:32–9:06<\u002Fspan><span class=\"filename\">frame_18.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"189c5d25-bf4e-41e3-b7c3-d270b1489b53\" alt=\"Frame 18\"><\u002Fdiv><\u002Ffigure>\n    <figure class=\"card\"><div class=\"frame-head\"><span class=\"num\">19<\u002Fspan><span class=\"label\">Why Influencing Is Vital<\u002Fspan><span class=\"tc\">9:07–9:46<\u002Fspan><span class=\"filename\">frame_19.svg<\u002Fspan><\u002Fdiv><div class=\"stage\"><img src=\"e609b47a-3ba6-45c0-801e-a0c850cd446d\" alt=\"Frame 19\"><\u002Fdiv><\u002Ffigure>\n  <\u002Fmain>\n\n  <footer>STS Motion — Persuasion · authentic illustrator waves · Remotion-ready &amp; naming-clean SVG · timings locked to the 9:46 voiceover.<\u002Ffooter>\n\n  <script>\n  (function () {\n    const CKEY = 'mp_frame_comments_v1';\n    const NKEY = 'mp_reviewer_name';\n    const OKEY = 'mp_open_threads_v1';\n\n    const load = (k, f) => { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch (e) { return f; } };\n    const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} };\n\n    let store = load(CKEY, {});          // { frame_0: [ {id, author, text, ts, resolved} ] }\n    let openSet = new Set(load(OKEY, []));\n    let reviewer = localStorage.getItem(NKEY) || '';\n\n    const uid = () => 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);\n    const esc = s => s.replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;' }[c]));\n    const fmt = ts => { const d = new Date(ts); return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }); };\n\n    const nameInput = document.getElementById('reviewer');\n    nameInput.value = reviewer;\n    nameInput.addEventListener('input', () => { reviewer = nameInput.value.trim(); localStorage.setItem(NKEY, reviewer); });\n\n    const cards = [...document.querySelectorAll('.card')];\n    const frames = cards.map(card => {\n      const fn = card.querySelector('.filename').textContent.trim();      // frame_0.svg\n      const id = fn.replace(/\\.svg$/i, '');\n      const label = card.querySelector('.label').textContent.trim();\n      const num = card.querySelector('.num').textContent.trim();\n      return { card, id, label, num };\n    });\n\n    function updateStats() {\n      let total = 0, open = 0;\n      Object.values(store).forEach(arr => arr.forEach(c => { total++; if (!c.resolved) open++; }));\n      document.getElementById('statTotal').textContent = total + (total === 1 ? ' comment' : ' comments');\n      document.getElementById('statOpen').textContent = open + ' open';\n    }\n\n    function renderThread(f) {\n      const arr = store[f.id] || [];\n      const openCount = arr.filter(c => !c.resolved).length;\n      const badge = f.wrap.querySelector('.cbadge');\n      badge.textContent = arr.length;\n      badge.classList.toggle('zero', arr.length === 0);\n      f.card.classList.toggle('flag', openCount > 0);\n      f.wrap.querySelector('.ctoggle').textContent = f.wrap.classList.contains('open') ? '▲' : '▼';\n\n      const thread = f.wrap.querySelector('.thread');\n      if (!arr.length) {\n        thread.innerHTML = '<div style=\"font-family:DM Mono,monospace;font-size:12px;color:#8a99bd\">No comments yet.<\u002Fdiv>';\n      } else {\n        thread.innerHTML = arr.map(c => `\n          <div class=\"cmt${c.resolved ? ' resolved' : ''}\" data-cid=\"${c.id}\">\n            <div class=\"cmeta\"><span class=\"cauthor\">${esc(c.author || 'Anon')}<\u002Fspan><span class=\"ctime\">${fmt(c.ts)}<\u002Fspan><\u002Fdiv>\n            <div class=\"ctext\">${esc(c.text)}<\u002Fdiv>\n            <div class=\"cactions\">\n              <button data-act=\"resolve\">${c.resolved ? 'Reopen' : 'Resolve'}<\u002Fbutton>\n              <button data-act=\"delete\">Delete<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>`).join('');\n      }\n    }\n\n    function addComment(f, text) {\n      text = text.trim();\n      if (!text) return;\n      if (!store[f.id]) store[f.id] = [];\n      store[f.id].push({ id: uid(), author: reviewer || 'Anon', text, ts: Date.now(), resolved: false });\n      save(CKEY, store);\n      renderThread(f); updateStats();\n    }\n\n    frames.forEach(f => {\n      const wrap = document.createElement('div');\n      wrap.className = 'comments' + (openSet.has(f.id) ? ' open' : '');\n      wrap.innerHTML = `\n        <div class=\"chead\">\n          COMMENTS <span class=\"cbadge zero\">0<\u002Fspan>\n          <span class=\"ctoggle\">▼<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cbody\">\n          <div class=\"thread\"><\u002Fdiv>\n          <div class=\"cform\">\n            <textarea placeholder=\"Add a QA note for ${esc(f.label)}…\"><\u002Ftextarea>\n            <div class=\"crow\"><span class=\"hint\">Enter to post · Shift+Enter for a new line<\u002Fspan>\n              <button type=\"button\">Post comment<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n      f.card.appendChild(wrap);\n      f.wrap = wrap;\n\n      wrap.querySelector('.chead').addEventListener('click', () => {\n        wrap.classList.toggle('open');\n        if (wrap.classList.contains('open')) openSet.add(f.id); else openSet.delete(f.id);\n        save(OKEY, [...openSet]);\n        wrap.querySelector('.ctoggle').textContent = wrap.classList.contains('open') ? '▲' : '▼';\n      });\n\n      const ta = wrap.querySelector('textarea');\n      wrap.querySelector('.cform button').addEventListener('click', () => { addComment(f, ta.value); ta.value = ''; });\n      ta.addEventListener('keydown', e => {\n        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addComment(f, ta.value); ta.value = ''; }\n      });\n\n      wrap.querySelector('.thread').addEventListener('click', e => {\n        const btn = e.target.closest('button'); if (!btn) return;\n        const cid = e.target.closest('.cmt').dataset.cid;\n        const arr = store[f.id] || []; const c = arr.find(x => x.id === cid); if (!c) return;\n        if (btn.dataset.act === 'resolve') c.resolved = !c.resolved;\n        if (btn.dataset.act === 'delete') { if (!confirm('Delete this comment?')) return; store[f.id] = arr.filter(x => x.id !== cid); }\n        save(CKEY, store); renderThread(f); updateStats();\n      });\n\n      renderThread(f);\n    });\n\n    updateStats();\n\n    // Expand / collapse all\n    document.getElementById('btnExpand').addEventListener('click', function () {\n      const anyClosed = frames.some(f => !f.wrap.classList.contains('open'));\n      frames.forEach(f => {\n        f.wrap.classList.toggle('open', anyClosed);\n        if (anyClosed) openSet.add(f.id); else openSet.delete(f.id);\n        f.wrap.querySelector('.ctoggle').textContent = anyClosed ? '▲' : '▼';\n      });\n      save(OKEY, [...openSet]);\n      this.textContent = anyClosed ? 'Collapse all' : 'Expand all';\n    });\n\n    // Export — one JSON file the QA reviewer sends back\n    document.getElementById('btnExport').addEventListener('click', () => {\n      const payload = {\n        project: 'Mastering Persuasion', kind: 'qa-comments', version: 1,\n        reviewer: reviewer || 'Anon', exportedAt: new Date().toISOString(),\n        frames: frames.map(f => ({ id: f.id, num: f.num, label: f.label, comments: store[f.id] || [] }))\n                       .filter(f => f.comments.length)\n      };\n      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });\n      const a = document.createElement('a');\n      a.href = URL.createObjectURL(blob);\n      a.download = 'mp-qa-comments-' + (reviewer || 'anon').replace(/\\s+/g, '_').toLowerCase() + '-' + new Date().toISOString().slice(0, 10) + '.json';\n      document.body.appendChild(a); a.click(); a.remove();\n    });\n\n    // Import — merge another reviewer's export (dedup by comment id)\n    document.getElementById('fileImport').addEventListener('change', function () {\n      const file = this.files[0]; if (!file) return;\n      const r = new FileReader();\n      r.onload = () => {\n        try {\n          const data = JSON.parse(r.result);\n          const list = data.frames || [];\n          let added = 0;\n          list.forEach(fr => {\n            if (!store[fr.id]) store[fr.id] = [];\n            const seen = new Set(store[fr.id].map(c => c.id));\n            (fr.comments || []).forEach(c => { if (!seen.has(c.id)) { store[fr.id].push(c); added++; } });\n            store[fr.id].sort((a, b) => a.ts - b.ts);\n          });\n          save(CKEY, store);\n          frames.forEach(renderThread); updateStats();\n          alert('Imported ' + added + ' comment' + (added === 1 ? '' : 's') + (data.reviewer ? ' from ' + data.reviewer : '') + '.');\n        } catch (e) { alert('Could not read that file — expected a QA comments export.'); }\n      };\n      r.readAsText(file); this.value = '';\n    });\n\n    // Clear only this reviewer's own comments\n    document.getElementById('btnClearMine').addEventListener('click', () => {\n      const me = reviewer || 'Anon';\n      if (!confirm('Remove all comments authored by \"' + me + '\" on this device?')) return;\n      Object.keys(store).forEach(k => { store[k] = store[k].filter(c => (c.author || 'Anon') !== me); if (!store[k].length) delete store[k]; });\n      save(CKEY, store); frames.forEach(renderThread); updateStats();\n    });\n  })();\n  <\u002Fscript>\n\n\n  \n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
